<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sfondo -->
  <rect width="64" height="64" rx="14" fill="#121212"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#333" stroke-width="0.5"/>

  <!-- Dot viola -->
  <circle cx="42" cy="14" r="3.5" fill="#3d3278" opacity="0.9"/>
  <circle cx="52" cy="13" r="5" fill="#7b61ff" opacity="0.9"/>

  <!-- Chevron > (glow + solido) -->
  <polyline points="14,22 26,32 14,42" fill="none" stroke="#00ff99" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#glow)"/>
  <polyline points="14,22 26,32 14,42" fill="none" stroke="#00ff99" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Barra cursore -->
  <rect x="25" y="46" width="28" height="5" rx="2.5" fill="#00ff99"/>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
